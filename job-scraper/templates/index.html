<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Scraper Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1><span class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h18M3 12h18M3 17h10"/><circle cx="19" cy="17" r="2.5"/><path d="m21.5 19.5 1.5 1.5"/></svg></span> Job Scraper Dashboard</h1>
    <span class="sub">Apify · LinkedIn · Indeed · Glassdoor · Career Sites</span>
    <nav class="nav"><a href="/resume">Resume Generator</a> &nbsp; <a href="/outreach">Outreach →</a></nav>
  </header>

  <section class="panel">
    <div class="form-grid">
      <label>Keywords / Job titles (comma-separated)
        <input id="keywords" type="text" placeholder="e.g. AI Engineer, Data Scientist"
               value="AI Engineer, Machine Learning Engineer, AI/ML Engineer, ML Research Engineer, Applied Machine Learning Engineer, Deep Learning Engineer, NLP Engineer, Computer Vision Engineer, Generative AI Engineer, LLM Engineer, AI Research Engineer, Machine Learning Researcher, MLOps Engineer, AI Platform Engineer, ML Platform Engineer, AI Infrastructure Engineer, Machine Learning Infrastructure Engineer, Analytics Engineer, AI Data Scientist, Research Scientist, AI Scientist, ML Scientist, Statistical Modeling Scientist, Quantitative Researcher, Predictive Modeling Engineer, Recommendation Systems Engineer, Search Relevance Engineer, Ranking Engineer, Personalization Engineer, Speech Recognition Engineer, Conversational AI Engineer, Chatbot Engineer, Prompt Engineer, AI Solutions Engineer, AI Product Engineer, AI Software Engineer, Machine Learning Software Engineer, Robotics AI Engineer, Autonomous Systems Engineer, Reinforcement Learning Engineer, AI Consultant, Machine Learning Consultant, AI Architect, Machine Learning Architect">
      </label>
      <label>Location
        <input id="location" type="text" placeholder="e.g. United States" value="United States">
      </label>
      <label>Jobs per source (shared)
        <input id="limit" type="number" min="1" value="5">
      </label>
      <label>Posted within (shared)
        <select id="maxAge">
          <option value="1" selected>Last 24 hours</option>
          <option value="3">Last 3 days</option>
          <option value="7">Last 7 days</option>
          <option value="14">Last 14 days</option>
          <option value="">Any time</option>
        </select>
      </label>
    </div>

    <fieldset class="sources">
      <legend>Sources</legend>
      {% for key, cfg in sources.items() %}
      <label class="chk"><input type="checkbox" class="source" value="{{ key }}" checked> {{ cfg.label }}</label>
      {% endfor %}
    </fieldset>

    <label class="scrape-profile">Auto-generate tailored resumes for profile
      <select id="scrapeProfile"></select>
    </label>

    <div class="scrape-actions">
      <button id="scrapeBtn">Scrape Jobs</button>
      <a id="viewQueueLink" href="/resume" class="nav-link" style="display:none">View resume queue →</a>
    </div>
    <div id="status" class="status"></div>
  </section>

  <section class="panel">
    <div class="toolbar">
      <input id="search" type="text" placeholder="Filter results…">
      <select id="sourceFilter">
        <option value="">All sources</option>
        {% for key, cfg in sources.items() %}
        <option value="{{ cfg.label }}">{{ cfg.label }}</option>
        {% endfor %}
      </select>
      <select id="runFilter"><option value="">All runs</option></select>
      <span id="counts" class="counts"></span>
    </div>

    <table id="jobsTable">
      <thead>
        <tr>
          <th data-sort="title">Title</th>
          <th data-sort="company">Company</th>
          <th data-sort="location">Location</th>
          <th data-sort="salary">Salary</th>
          <th data-sort="source">Source</th>
          <th data-sort="posted_date">Posted ▾</th>
          <th>Link</th>
        </tr>
      </thead>
      <tbody id="jobsBody"></tbody>
    </table>
    <div id="empty" class="empty">No jobs yet — run a scrape above.</div>
  </section>

  <script src="/static/app.js"></script>
</body>
</html>
