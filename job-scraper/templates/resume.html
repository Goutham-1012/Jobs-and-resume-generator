<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Generator</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>📄 Resume Generator</h1>
    <span class="sub">OpenAI · ATS-optimized for Data / AI-ML roles</span>
    <nav class="nav"><a href="/">← Job Dashboard</a></nav>
  </header>

  <section class="panel">
    <div class="resume-grid">
      <label>Your current resume (paste plain text)
        <textarea id="resume" rows="16" placeholder="Paste your full resume here…"></textarea>
      </label>
      <div>
        <label>Target job description
          <div class="jd-tools">
            <select id="jobPicker"><option value="">— or load from a scraped job —</option></select>
          </div>
          <textarea id="jobDescription" rows="9" placeholder="Paste the job description here, or pick a scraped job above…"></textarea>
        </label>
        <div class="meta-row">
          <label>Company <span class="opt">(optional)</span>
            <input id="company" type="text" placeholder="e.g. Amazon">
          </label>
          <label>Title <span class="opt">(optional)</span>
            <input id="title" type="text" placeholder="e.g. ML SDE-2">
          </label>
        </div>
      </div>
    </div>
    <div class="resume-actions">
      <button id="addBtn">+ Add to Queue</button>
      <button id="genAllBtn" class="secondary">Generate All</button>
      <span id="status" class="status"></span>
    </div>
  </section>

  <section class="panel" id="queuePanel" style="display:none">
    <div class="toolbar">
      <strong>Queue (<span id="queueCount">0</span>)</strong>
      <span class="counts"><button id="clearBtn" class="mini">Clear queue</button></span>
    </div>
    <ul id="queueList" class="queue"></ul>
  </section>

  <section class="panel" id="outputPanel" style="display:none">
    <div class="toolbar">
      <strong>Preview</strong>
      <span class="counts">
        <button id="copyBtn" class="mini">Copy</button>
        <button id="dlBtn" class="mini">Download .docx</button>
      </span>
    </div>
    <pre id="output" class="output"></pre>
  </section>

  <script src="/static/resume.js"></script>
</body>
</html>
